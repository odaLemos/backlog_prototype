<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#311084"/>
      <stop offset="100%" stop-color="#0f052d"/>
    </linearGradient>
    <linearGradient id="controllerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7e22ce"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background base -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>
  
  <!-- Outer decorative glowing ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#accentGrad)" stroke-width="6" opacity="0.3" filter="url(#glow)"/>
  
  <!-- Inner console controller body -->
  <g filter="url(#glow)" transform="translate(96, 146)">
    <!-- Main controller shell -->
    <path d="M 50,110 
             C 50,70 90,40 160,40 
             C 230,40 270,70 320,110 
             C 340,126 350,150 350,180 
             C 350,230 280,280 250,280 
             C 230,280 220,250 160,250 
             C 100,250 90,280 70,280 
             C 40,280 -30,230 -30,180 
             C -30,150 -20,126 50,110 Z" 
          fill="url(#controllerGrad)" stroke="#f8fafc" stroke-width="6"/>

    <!-- Left hand grip texture -->
    <path d="M -10,150 C -10,180 10,210 30,230" fill="none" stroke="#a855f7" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
    
    <!-- D-PAD (Direcional) -->
    <g transform="translate(60, 140)">
      <!-- Central base -->
      <rect x="-15" y="-45" width="30" height="90" rx="6" fill="#1e293b" stroke="#f8fafc" stroke-width="3"/>
      <rect x="-45" y="-15" width="90" height="30" rx="6" fill="#1e293b" stroke="#f8fafc" stroke-width="3"/>
      <circle cx="0" cy="0" r="10" fill="#475569"/>
    </g>

    <!-- Right Action Buttons (ABXY) -->
    <g transform="translate(260, 140)">
      <!-- X button (Top) -->
      <circle cx="0" cy="-30" r="16" fill="#38bdf8" stroke="#f8fafc" stroke-width="2"/>
      <text x="0" y="-2" font-family="system-ui, sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="central">Y</text>
      
      <!-- A button (Bottom) -->
      <circle cx="0" cy="30" r="16" fill="#22c55e" stroke="#f8fafc" stroke-width="2"/>
      <text x="0" y="30" font-family="system-ui, sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="central">A</text>
      
      <!-- Y button (Left) -->
      <circle cx="-30" cy="0" r="16" fill="#eab308" stroke="#f8fafc" stroke-width="2"/>
      <text x="-30" y="0" font-family="system-ui, sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="central">X</text>
      
      <!-- B button (Right) -->
      <circle cx="30" cy="0" r="16" fill="#ef4444" stroke="#f8fafc" stroke-width="2"/>
      <text x="30" y="0" font-family="system-ui, sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="central">B</text>
    </g>

    <!-- Thumbsticks -->
    <g transform="translate(115, 195)">
      <circle cx="0" cy="0" r="32" fill="#0f172a" stroke="#cbd5e1" stroke-width="3"/>
      <circle cx="0" cy="0" r="20" fill="#475569"/>
    </g>
    <g transform="translate(205, 195)">
      <circle cx="0" cy="0" r="32" fill="#0f172a" stroke="#cbd5e1" stroke-width="3"/>
      <circle cx="0" cy="0" r="20" fill="#475569"/>
    </g>

    <!-- Menu / Select Buttons -->
    <rect x="130" y="115" width="22" height="8" rx="4" transform="rotate(-20, 130, 115)" fill="#e2e8f0"/>
    <rect x="170" y="115" width="22" height="8" rx="4" transform="rotate(-20, 170, 115)" fill="#e2e8f0"/>

    <!-- Center Logo/Home Button -->
    <circle cx="160" cy="145" r="20" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
    <polygon points="152,152 160,136 168,152" fill="#7e22ce"/>
  </g>
</svg>
